name: Weekly Update Significant Papers
on:
  schedule:
    - cron: '0 4 * * 1'   # Monday 04:00 UTC — 1 hour after daily run
  workflow_dispatch:       # Manual trigger for testing
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt anthropic
      # ════════════════════════════════════════════════════════════════════
      # WEEKLY SIGNIFICANT PAPERS DISCOVERY
      #
      # What this does (discovery + retirement only):
      #   1. Fetches new cs.AI arXiv IDs since last run via OAI-PMH
      #   2. Looks up citation counts via Semantic Scholar batch API
      #   3. Maintains a top-500 candidate pool in sig_candidates.json
      #   4. Selects top-75 by influential citations → significant.parquet
      #   5. Applies two-strike retirement logic
      #
      # What this does NOT do (handled by daily_significant.yml instead):
      #   - Author h-index enrichment (OpenAlex)
      #   - S2 citation refresh for the candidate pool
      #   - Prominence recomputation
      #
      # New papers enter with Prominence="Unverified". The daily job
      # enriches them within 24 hours (up to 900 authors/day).
      #
      # Cost: ~$0. Uses only S2 free tier. Runtime: ~5 min.
      # ════════════════════════════════════════════════════════════════════
      - name: Run Significant Papers Scan
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python update_significant.py
      - name: Commit Significant Papers
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add significant.parquet sig_candidates.json author_cache.json ss_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update significant papers pool: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin main
            git push
          fi

      # ════════════════════════════════════════════════════════════════════
      # WEEKLY FULL PIPELINE RUN (with Haiku grouping)
      #
      # Runs immediately after the significant papers scan so the atlas
      # reflects the updated pool. This is the only weekly run that calls
      # Haiku — daily runs use SKIP_HAIKU=true (nearest-centroid only).
      #
      # SKIP_HAIKU is intentionally absent here → full two-pass grouping.
      # ════════════════════════════════════════════════════════════════════
      - name: Run Weekly Atlas Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python update_map_v3.py

      - name: Run Nightly Assertions
        run: python nightly_assert.py

      - name: Commit Weekly Pipeline Outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add database.parquet run_state.json author_cache.json author_stats_cache.json label_diagnostics.json group_names_v3.json dynamic_taxonomy.json labels_v3.parquet ss_cache.json significant_papers.json sig_candidates.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly atlas update: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
